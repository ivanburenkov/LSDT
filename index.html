<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LSDT: SLSQP "Walking" Solver</title>
    <script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.25.1/full/pyodide.js"></script>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; display: flex; flex-direction: column; gap: 20px; }
        .dashboard { display: grid; grid-template-columns: 350px 1fr 1fr; gap: 20px; }
        .panel { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .plot { width: 100%; height: 350px; background: #fafafa; border: 1px solid #ddd; }
        .controls label { display: block; margin-top: 10px; font-weight: bold; font-size: 0.9em; }
        input, button { width: 100%; padding: 8px; margin-top: 5px; box-sizing: border-box; }
        button { background: #007bff; color: white; border: none; cursor: pointer; font-weight: bold; margin-top: 15px; }
        button:disabled { background: #ccc; }
        #log { font-family: monospace; font-size: 11px; height: 100px; overflow-y: auto; background: #222; color: #0f0; padding: 10px; margin-top: 10px; border-radius: 4px; }
    </style>
</head>
<body>

    <div class="dashboard">
        <div class="panel controls">
            <h3>LSDT Controls</h3>
            <button id="btn-init">1. Initialize Engine</button>
            <input type="file" id="file-in" disabled>
            
            <label>Max Total Iterations</label>
            <input type="number" id="total-iter" value="50">
            
            <label>Iters per Step (Walking)</label>
            <input type="number" id="step-iter" value="2">
            
            <label>Max Photons (N)</label>
            <input type="number" id="max-n" value="15">

            <label>Pulses</label>
            <input type="number" id="num-pulses" value="1">

            <button id="btn-run" disabled>2. Start Walking Solver</button>
            <div id="log">Ready to initialize...</div>
        </div>

        <div class="panel">
            <div id="plot-fit" class="plot"></div>
            <div id="plot-mse" class="plot" style="margin-top:20px"></div>
        </div>
        
        <div class="panel">
            <div id="plot-heat" class="plot" style="height: 720px;"></div>
        </div>
    </div>

    <script>
        let pyodide, parsedAlphas, parsedCounts, lastPovm = null;
        let isRunning = false;
        const log = (m) => { const e = document.getElementById('log'); e.innerText += `\n> ${m}`; e.scrollTop = e.scrollHeight; };

        const pythonCode = `
import numpy as np
from scipy.optimize import minimize
import math

def get_F(alphas_sq, max_n):
    F = np.zeros((len(alphas_sq), max_n + 1))
    for i, mu in enumerate(alphas_sq):
        for n in range(max_n + 1):
            F[i, n] = np.exp(-mu) * (mu**n) / math.factorial(n)
    F[:, -1] = 1.0 - np.sum(F[:, :-1], axis=1)
    return np.clip(F, 0, 1)

def solve_step(counts, alphas_sq, max_c, max_n, pulses, x0_list, iters):
    P_meas = np.array(counts).reshape((-1, max_c + 1))
    F = get_F(alphas_sq, max_n) * pulses
    w = 1.0 / (P_meas + 1.0)
    
    # Use provided x0 (previous outcome)
    x0 = np.array(x0_list)
    
    def obj(x):
        povm = x.reshape((max_c + 1, max_n + 1))
        return np.sum(w * ((F @ povm.T - P_meas)**2))

    cons = [{'type': 'eq', 'fun': lambda x, n=i: np.sum(x.reshape((max_c+1, max_n+1))[:, n]) - 1.0} for i in range(max_n + 1)]
    res = minimize(obj, x0, method='SLSQP', bounds=[(0,1)]*len(x0), constraints=cons, options={'maxiter': iters})
    
    # Calculate stats for GUI
    povm_res = res.x.reshape((max_c + 1, max_n + 1))
    P_mod = (F / pulses) @ povm_res.T
    mse = np.mean(((P_mod) - (P_meas/pulses))**2)
    
    return {"x": res.x.tolist(), "expected": (F @ povm_res.T).flatten().tolist(), "mse": float(mse)}
`;

        document.getElementById('btn-init').onclick = async () => {
            log("Loading Pyodide...");
            pyodide = await loadPyodide();
            await pyodide.loadPackage(['numpy', 'scipy']);
            await pyodide.runPythonAsync(pythonCode);
            log("Engine ready.");
            document.getElementById('file-in').disabled = false;
        };

        document.getElementById('file-in').onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (ev) => {
                const lines = ev.target.result.trim().split('\n');
                const header = lines[0].trim().split(/\s+/).map(Number);
                const maxC = header[0];
                const numA = header[1];
                parsedAlphas = lines[1].trim().split(/\s+/).map(Number);
                parsedCounts = lines.slice(2).flatMap(l => l.trim().split(/\s+/).map(Number));
                
                initPlots(maxC, numA);
                document.getElementById('btn-run').disabled = false;
                log("Data loaded.");
            };
            reader.readAsText(e.target.files[0]);
        };

        function initPlots(maxC, numA) {
            // Fit Plot
            const traces = [];
            for(let c=0; c<=maxC; c++) {
                const y = []; for(let i=0; i<numA; i++) y.push(parsedCounts[i*(maxC+1)+c]);
                traces.push({ x: parsedAlphas, y: y, mode: 'markers', name: `Exp c=${c}` });
                traces.push({ x: parsedAlphas, y: new Array(numA).fill(0), mode: 'lines', name: `Fit c=${c}`, line: {dash:'dot'} });
            }
            Plotly.newPlot('plot-fit', traces, { title: 'Experimental vs Model', margin: {t:30, b:40} });

            // MSE Plot
            Plotly.newPlot('plot-mse', [{ x: [0], y: [1], mode: 'lines+markers', name: 'MSE' }], 
                { title: 'Convergence', yaxis: {type: 'log'}, margin: {t:30, b:40} });

            // Heatmap
            const maxN = parseInt(document.getElementById('max-n').value);
            Plotly.newPlot('plot-heat', [{
                z: Array.from({length: maxC+1}, () => new Array(maxN+1).fill(0)),
                type: 'heatmap', colorscale: 'Viridis'
            }], { title: 'POVM Reconstruction (Live)', xaxis: {title:'n'}, yaxis: {title:'c'} });
        }

        document.getElementById('btn-run').onclick = async () => {
            if(isRunning) return;
            isRunning = true;
            const total = parseInt(document.getElementById('total-iter').value);
            const step = parseInt(document.getElementById('step-iter').value);
            const maxN = parseInt(document.getElementById('max-n').value);
            const pulses = parseInt(document.getElementById('num-pulses').value);
            const maxC = (parsedCounts.length / parsedAlphas.length) - 1;
            
            // Initial Guess: Uniform
            if(!lastPovm) lastPovm = new Array((maxC+1)*(maxN+1)).fill(1.0/(maxC+1));

            for(let i=0; i < total; i += step) {
                if(!isRunning) break;
                
                const result = await pyodide.globals.get("solve_step")(
                    parsedCounts, parsedAlphas, maxC, maxN, pulses, lastPovm, step
                );
                const resJs = result.toJs();
                lastPovm = resJs.get('x');
                
                // Update Heatmap
                const z = [];
                for(let c=0; c<=maxC; c++) z.push(lastPovm.slice(c*(maxN+1), (c+1)*(maxN+1)));
                Plotly.restyle('plot-heat', { z: [z] });

                // Update Fit Lines
                const expFlat = resJs.get('expected');
                const modelY = [];
                for(let c=0; c<=maxC; c++) {
                    const row = [];
                    for(let a=0; a<parsedAlphas.length; a++) row.push(expFlat[a*(maxC+1)+c]);
                    modelY.push(row);
                }
                const modelIndices = Array.from({length: maxC+1}, (_, k) => (k*2)+1);
                Plotly.restyle('plot-fit', { y: modelY }, modelIndices);

                // Update MSE
                Plotly.extendTraces('plot-mse', { x: [[i+step]], y: [[resJs.get('mse')]] }, [0]);
                
                log(`Iteration ${i+step}/${total} - MSE: ${resJs.get('mse').toExponential(2)}`);
                await new Promise(r => setTimeout(r, 10)); // Allow UI to breathe
                result.destroy();
            }
            isRunning = false;
        };
    </script>
</body>
</html>
