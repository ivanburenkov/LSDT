<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Least Squares Detector Tomography (LSDT)</title>
    
    <script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>
    
    <script src="https://cdn.jsdelivr.net/pyodide/v0.25.1/full/pyodide.js"></script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; max-width: 1400px; margin: 0 auto; padding: 20px; color: #333; background-color: #f4f7f6; }
        h1 { border-bottom: 2px solid #0056b3; padding-bottom: 10px; color: #0056b3; }
        .container { display: flex; flex-wrap: wrap; gap: 20px; margin-top: 20px; }
        
        /* Sidebar */
        .sidebar { flex: 1; min-width: 320px; max-width: 400px; background: #fff; padding: 25px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 15px; }
        .form-row { display: flex; gap: 10px; }
        .form-row .form-group { flex: 1; }
        label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 14px; }
        input[type="number"], input[type="file"] { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        input[readonly] { background-color: #e9ecef; }
        
        /* Buttons */
        button { background: #0056b3; color: white; border: none; padding: 12px 15px; cursor: pointer; border-radius: 4px; font-size: 16px; width: 100%; margin-bottom: 10px; font-weight: bold; transition: background 0.2s; }
        button:hover { background: #004494; }
        button:disabled { background: #cccccc; cursor: not-allowed; }
        
        /* Main Content */
        .main-content { flex: 2; min-width: 700px; background: #fff; padding: 25px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); display: flex; flex-direction: column; gap: 20px; }
        .plot-container { width: 100%; max-width: 900px; height: auto; min-height: 400px; margin: 0 auto; background: #fafafa; border: 1px solid #eee; border-radius: 4px; display: flex; justify-content: center; overflow: hidden; }
        
        /* Logs */
        .log-area { width: 100%; height: 120px; background: #1e1e1e; color: #00ff00; border: none; border-radius: 4px; padding: 10px; overflow-y: scroll; font-family: monospace; font-size: 13px; box-sizing: border-box; resize: vertical; }
    </style>
</head>
<body>

    <h1>LSDT POVM Reconstruction Interface</h1>

    <div class="container">
        <div class="sidebar">
            <h3>1. Environment</h3>
            <button id="btn-init">Initialize Pyodide & Python</button>

            <h3>2. Upload Data</h3>
            <div class="form-group">
                <label for="data-file">Experimental Data File (TXT)</label>
                <input type="file" id="data-file" accept=".txt,.csv,.dat" disabled>
            </div>

            <h3>3. Parameters</h3>
            <div class="form-row">
                <div class="form-group">
                    <label for="max-c">Max Clicks (C)</label>
                    <input type="number" id="max-c" value="0" readonly title="Auto-filled from file">
                </div>
                <div class="form-group">
                    <label for="num-alphas">Num Alphas</label>
                    <input type="number" id="num-alphas" value="0" readonly title="Auto-filled from file">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="max-n">Max Photons (N)</label>
                    <input type="number" id="max-n" value="20" min="1">
                </div>
                <div class="form-group">
                    <label for="num-pulses">Number of Pulses</label>
                    <input type="number" id="num-pulses" value="1" min="1">
                </div>
            </div>

            <hr style="border: 0; border-top: 1px solid #ddd; margin: 20px 0;">

            <button id="btn-start" disabled>Run Tomography (LSDT)</button>
        </div>

        <div class="main-content">
            <div id="data-plot-div" class="plot-container"></div>
            <div id="plotly-div" class="plot-container"></div>
            <textarea id="log-output" class="log-area" readonly></textarea>
        </div>
    </div>

    <script>
        let pyodideInstance = null;
        let parsedAlphas = null;
        let parsedCounts = null;

        const logBox = document.getElementById('log-output');
        const btnInit = document.getElementById('btn-init');
        const btnStart = document.getElementById('btn-start');
        const fileInput = document.getElementById('data-file');

        function logMsg(msg) {
            logBox.value += `[${new Date().toLocaleTimeString()}] ${msg}\n`;
            logBox.scrollTop = logBox.scrollHeight;
        }

        // --- Python LSDT Script ---
        const pythonLSDTCode = `
import numpy as np
from cvxopt import matrix, solvers
import math

def coherentStateProb(alpha, k):
    return np.exp(-alpha**2) * alpha**(2*k) / math.factorial(k)

def Fexperiment(mean_photon_numbers, k):
    F = np.zeros((len(mean_photon_numbers), k + 1))
    for j1, mu in enumerate(mean_photon_numbers):
        for j2 in np.arange(k + 1):
            F[j1, j2] = coherentStateProb(np.sqrt(mu), j2)
    # Completeness constraint for truncated Fock space
    F[:, -1] = 1.0 - np.sum(F[:, :-1], axis=1)
    F[F < 0] = 0.0 # Clean up floating point errors
    return F

def run_lsdt_task(counts_flat, alphas_sq_flat, num_a, max_c, max_n, num_pulses):
    PMeas = np.array(counts_flat).reshape((num_a, max_c + 1))
    mean_photon_number = np.array(alphas_sq_flat)
    
    n_outcomes = max_c + 1
    k_plus_1 = max_n + 1
    
    solvers.options['show_progress'] = False
    Fprime = Fexperiment(mean_photon_number, max_n)
    
    vecPMeas = PMeas.T.flatten() # Order: [c0a0, c0a1... c1a0...]
    
    W = np.diag(1.0 / (vecPMeas + 1.0))
    IdF = np.kron(np.identity(n_outcomes), Fprime * num_pulses)
    
    Q = matrix(2. * IdF.T @ W @ IdF)
    q = matrix(-2. * IdF.T @ W @ vecPMeas)
    
    Gpos = matrix(-np.identity(k_plus_1 * n_outcomes))
    hpos = matrix(np.zeros(k_plus_1 * n_outcomes))
    
    # Sum over outcomes for a given input state equals 1
    Asum = np.zeros((k_plus_1, k_plus_1 * n_outcomes))
    for n in range(k_plus_1):
        for c in range(n_outcomes):
            Asum[n, c * k_plus_1 + n] = 1.0
            
    bsum = matrix(np.ones(k_plus_1))
    
    sol = solvers.qp(Q, q, Gpos, hpos, matrix(Asum), bsum)
    return list(sol['x'])
`;

        // --- Pyodide Initialization ---

       btnInit.addEventListener('click', async () => {
            btnInit.disabled = true;
            logMsg("Initializing Environment...");
            try {
                // Point specifically to the 'full' distribution index
                pyodideInstance = await loadPyodide({
                    indexURL: "https://cdn.jsdelivr.net/pyodide/v0.25.1/full/"
                });
        
                logMsg("Loading NumPy and CVXOPT binaries...");
                
                // This command looks for cvxopt.js and cvxopt.data in the indexURL above
                await pyodideInstance.loadPackage(["numpy", "cvxopt"]);
        
                logMsg("Verifying solver availability...");
                await pyodideInstance.runPythonAsync(`
        import cvxopt
        from cvxopt import solvers
        print("Success: CVXOPT loaded.")
                `);
        
                logMsg("Loading LSDT Python logic...");
                await pyodideInstance.runPythonAsync(pythonLSDTCode);
                
                logMsg("Ready.");
                btnInit.textContent = "Engine Ready";
                fileInput.disabled = false;
            } catch (err) {
                logMsg("Error: " + err.message);
                console.error(err);
                btnInit.disabled = false;
            }
        });
        
        /*btnInit.addEventListener('click', async () => {
            btnInit.disabled = true;
            logMsg("Downloading Pyodide... (This may take a moment)");
            try {
                pyodideInstance = await loadPyodide();
                logMsg("Pyodide loaded. Installing numpy and cvxopt...");
                await pyodideInstance.loadPackage(["numpy", "cvxopt"]);
                logMsg("Packages installed. Loading LSDT Python logic...");
                await pyodideInstance.runPythonAsync(pythonLSDTCode);
                logMsg("Ready. You may now upload data.");
                btnInit.textContent = "Python Ready";
                fileInput.disabled = false;
            } catch (err) {
                logMsg("Failed to load Pyodide: " + err);
                btnInit.disabled = false;
            }
        });*/

        // --- File Parsing ---
        fileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                const text = event.target.result;
                const tokens = text.trim().split(/\s+/).map(Number);

                if (tokens.length < 2) {
                    logMsg("Error: Invalid file format.");
                    return;
                }

                let idx = 0;
                const fileMaxC = tokens[idx++];
                const fileNumA = tokens[idx++];

                document.getElementById('max-c').value = fileMaxC;
                document.getElementById('num-alphas').value = fileNumA;

                // Read Alphas (stored as alpha^2)
                parsedAlphas = new Float64Array(fileNumA);
                for (let i = 0; i < fileNumA; i++) {
                    parsedAlphas[i] = tokens[idx++]; 
                }

                // Read Counts
                const totalCountElements = fileNumA * (fileMaxC + 1);
                parsedCounts = new Float64Array(totalCountElements);
                for (let i = 0; i < totalCountElements; i++) {
                    parsedCounts[i] = tokens[idx++] || 0;
                }

                logMsg(`Loaded data: ${fileNumA} alphas, max clicks = ${fileMaxC}`);
                plotExperimentalData(parsedAlphas, parsedCounts, fileNumA, fileMaxC);
                btnStart.disabled = false;
            };
            reader.readAsText(file);
        });

        // --- Plotly Graphics ---
        function plotExperimentalData(alphasSq, counts, numA, maxC) {
            let traces = [];
            for (let c = 0; c <= maxC; c++) {
                let xData = [], yData = [], errorData = [];
                for (let i = 0; i < numA; i++) {
                    let val = counts[i * (maxC + 1) + c];
                    xData.push(alphasSq[i]);
                    yData.push(val);
                    errorData.push(Math.sqrt(val));
                }
                traces.push({ x: xData, y: yData, error_y: { type: 'data', array: errorData, visible: true }, mode: 'lines+markers', name: `c=${c}` });
            }
            let layout = { title: 'Experimental Data: Counts vs Alpha²', xaxis: { title: 'Alpha Squared (Mean Photons)' }, yaxis: { title: 'Counts' }, margin: { l: 60, r: 50, b: 50, t: 50 } };
            Plotly.newPlot('data-plot-div', traces, layout);
        }

        function initHeatmap(maxN, maxC) {
            const container = document.getElementById('plotly-div');
            const dataRatio = (maxN + 1) / (maxC + 1);
            let plotWidth = container.clientWidth;
            let plotHeight = plotWidth / dataRatio;
            if (plotHeight > 500) { plotHeight = 500; plotWidth = 500 * dataRatio; }

            let data = [{
                z: Array.from({length: maxC + 1}, () => new Array(maxN + 1).fill(0)),
                x: Array.from({length: maxN + 1}, (_, i) => i),
                y: Array.from({length: maxC + 1}, (_, i) => i),
                type: 'heatmap', colorscale: 'Viridis', zmin: 0, zmax: 1
            }];

            let layout = {
                title: 'Reconstructed POVM Heatmap',
                width: plotWidth, height: plotHeight, autosize: false,
                xaxis: { title: 'Photons (n)', scaleanchor: "y", scaleratio: 1 },
                yaxis: { title: 'Clicks (c)' },
                margin: { l: 50, r: 50, b: 50, t: 50 }
            };
            Plotly.newPlot('plotly-div', data, layout);
        }

        function updateHeatmap(flatPovmArray, maxN, maxC) {
            let zData = [];
            for (let c = 0; c <= maxC; c++) {
                let row = [];
                for (let n = 0; n <= maxN; n++) {
                    // Python output is [c0n0, c0n1... c1n0...]
                    row.push(flatPovmArray[c * (maxN + 1) + n]);
                }
                zData.push(row);
            }
            Plotly.restyle('plotly-div', { z: [zData] }, [0]);
        }

        // Handle browser resize for heatmap
        window.onresize = function() {
            const maxN = parseInt(document.getElementById('max-n').value);
            const maxC = parseInt(document.getElementById('max-c').value);
            if (!maxC || !maxN) return;
            const container = document.getElementById('plotly-div');
            const dataRatio = (maxN + 1) / (maxC + 1);
            let newWidth = container.clientWidth;
            let newHeight = newWidth / dataRatio;
            if (newHeight > 500) { newHeight = 500; newWidth = 500 * dataRatio; }
            Plotly.relayout('plotly-div', { width: newWidth, height: newHeight });
        };

        // --- Run LSDT Execution ---
        btnStart.addEventListener('click', async () => {
            const maxN = parseInt(document.getElementById('max-n').value);
            const maxC = parseInt(document.getElementById('max-c').value);
            const numA = parseInt(document.getElementById('num-alphas').value);
            const numPulses = parseInt(document.getElementById('num-pulses').value);

            initHeatmap(maxN, maxC);
            logMsg("Running Quadratic Programming Solver (UI will temporarily freeze)...");
            
            // Convert to standard JS arrays for Pyodide transfer
            const countsArray = Array.from(parsedCounts); 
            const alphaSqArray = Array.from(parsedAlphas);

            // Small delay to allow the DOM to render the log message before Python blocks the thread
            setTimeout(async () => {
                const startTime = performance.now();
                try {
                    const resultProxy = await pyodideInstance.globals.get("run_lsdt_task")(
                        countsArray, alphaSqArray, numA, maxC, maxN, numPulses
                    );
                    
                    if (typeof resultProxy === 'string') {
                        throw new Error(resultProxy); // Python exception caught
                    }

                    const povmResult = resultProxy.toJs();
                    resultProxy.destroy(); // Free memory
                    
                    const endTime = performance.now();
                    logMsg(`Optimization complete in ${((endTime - startTime)/1000).toFixed(2)}s.`);
                    
                    updateHeatmap(povmResult, maxN, maxC);
                    
                } catch (err) {
                    logMsg("CVXOPT Error: " + err);
                }
            }, 100);
        });
    </script>
</body>
</html>
