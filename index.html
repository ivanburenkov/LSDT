<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LSDT: SLSQP Walking Solver (Fixed)</title>
    <script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.25.1/full/pyodide.js"></script>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; display: flex; flex-direction: column; gap: 20px; }
        .dashboard { display: grid; grid-template-columns: 350px 1fr 1fr; gap: 20px; }
        .panel { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .plot { width: 100%; height: 350px; background: #fafafa; border: 1px solid #ddd; }
        .controls label { display: block; margin-top: 10px; font-weight: bold; font-size: 0.9em; }
        input, button { width: 100%; padding: 8px; margin-top: 5px; box-sizing: border-box; }
        .btn-start { background: #28a745; color: white; border: none; cursor: pointer; font-weight: bold; }
        .btn-stop { background: #dc3545; color: white; border: none; cursor: pointer; font-weight: bold; margin-top: 5px; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        #log { font-family: monospace; font-size: 11px; height: 120px; overflow-y: auto; background: #222; color: #0f0; padding: 10px; margin-top: 10px; border-radius: 4px; }
    </style>
</head>
<body>

    <div class="dashboard">
        <div class="panel controls">
            <h3>LSDT Controls</h3>
            <button id="btn-init" style="background:#007bff; color:white;">1. Initialize Engine</button>
            <input type="file" id="file-in" disabled>
            
            <label>Max Total Iterations</label>
            <input type="number" id="total-iter" value="100">
            
            <label>Iters per Step</label>
            <input type="number" id="step-iter" value="5">
            
            <label>Max Photons (N)</label>
            <input type="number" id="max-n" value="20">

            <label>Pulses</label>
            <input type="number" id="num-pulses" value="1">

            <button id="btn-run" class="btn-start" disabled>2. Start Solver</button>
            <button id="btn-stop" class="btn-stop" disabled>Stop Execution</button>
            
            <div id="log">Ready to initialize...</div>
        </div>

        <div class="panel">
            <div id="plot-fit" class="plot"></div>
            <div id="plot-mse" class="plot" style="margin-top:20px"></div>
        </div>
        
        <div class="panel">
            <div id="plot-heat" class="plot" style="height: 720px;"></div>
        </div>
    </div>

    <script>
        let pyodide, parsedAlphas, parsedCounts, lastPovm = null;
        let isRunning = false;
        let currentMaxC = 0;

        const log = (m) => { const e = document.getElementById('log'); e.innerText += `\n> ${m}`; e.scrollTop = e.scrollHeight; };

        const pythonCode = `
import numpy as np
from scipy.optimize import minimize
import math

def get_F(alphas_sq, max_n):
    F = np.zeros((len(alphas_sq), max_n + 1))
    for i, mu in enumerate(alphas_sq):
        for n in range(max_n + 1):
            F[i, n] = np.exp(-mu) * (mu**n) / math.factorial(n)
    F[:, -1] = 1.0 - np.sum(F[:, :-1], axis=1)
    return np.clip(F, 0, 1)

def solve_step(counts, alphas_sq, max_c, max_n, pulses, x0_list, iters):
    P_meas = np.array(counts).reshape((-1, max_c + 1))
    F_prob = get_F(alphas_sq, max_n)
    F_scaled = F_prob * pulses
    w = 1.0 / (P_meas + 1.0)
    
    x0 = np.array(x0_list)
    
    def obj(x):
        povm = x.reshape((max_c + 1, max_n + 1))
        P_mod = F_scaled @ povm.T
        return np.sum(w * ((P_mod - P_meas)**2))

    cons = [{'type': 'eq', 'fun': lambda x, n=i: np.sum(x.reshape((max_c+1, max_n+1))[:, n]) - 1.0} for i in range(max_n + 1)]
    res = minimize(obj, x0, method='SLSQP', bounds=[(0,1)]*len(x0), constraints=cons, options={'maxiter': iters})
    
    # Calculate stats for GUI
    povm_res = res.x.reshape((max_c + 1, max_n + 1))
    P_mod_prob = F_prob @ povm_res.T
    mse = np.mean((P_mod_prob - (P_meas/pulses))**2)
    
    return {"x": res.x.tolist(), "expected": (F_scaled @ povm_res.T).flatten().tolist(), "mse": float(mse)}
`;

        document.getElementById('btn-init').onclick = async () => {
            const btn = document.getElementById('btn-init');
            btn.disabled = true;
            log("Loading Pyodide & SciPy...");
            pyodide = await loadPyodide();
            await pyodide.loadPackage(['numpy', 'scipy']);
            await pyodide.runPythonAsync(pythonCode);
            log("Engine Ready.");
            document.getElementById('file-in').disabled = false;
        };

        document.getElementById('file-in').onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (ev) => {
                const lines = ev.target.result.trim().split('\n');
                const header = lines[0].trim().split(/\s+/).map(Number);
                currentMaxC = header[0];
                const numA = header[1];
                parsedAlphas = lines[1].trim().split(/\s+/).map(Number);
                parsedCounts = lines.slice(2).flatMap(l => l.trim().split(/\s+/).map(Number));
                
                lastPovm = null; // Reset POVM for new data
                initPlots(currentMaxC, numA);
                document.getElementById('btn-run').disabled = false;
                log(`Data loaded. C_max=${currentMaxC}, Alphas=${numA}`);
            };
            reader.readAsText(e.target.files[0]);
        };

        function initPlots(maxC, numA) {
            // Fit Plot
            const traces = [];
            for(let c=0; c<=maxC; c++) {
                const y = []; for(let i=0; i<numA; i++) y.push(parsedCounts[i*(maxC+1)+c]);
                traces.push({ x: parsedAlphas, y: y, mode: 'markers', name: `Exp c=${c}` });
                traces.push({ x: parsedAlphas, y: new Array(numA).fill(0), mode: 'lines', name: `Fit c=${c}`, line: {dash:'dot'} });
            }
            Plotly.newPlot('plot-fit', traces, { title: 'Fit Quality', margin: {t:40} });

            // MSE Plot
            Plotly.newPlot('plot-mse', [{ x: [], y: [], mode: 'lines+markers', name: 'MSE' }], 
                { title: 'Log-MSE Convergence', yaxis: {type: 'log'}, margin: {t:40} });

            // Heatmap
            const maxN = parseInt(document.getElementById('max-n').value);
            const z = Array.from({length: maxC+1}, () => new Array(maxN+1).fill(0));
            Plotly.newPlot('plot-heat', [{ z: z, type: 'heatmap', colorscale: 'Viridis' }], 
                { title: `POVM (C x N)`, xaxis: {title:'n'}, yaxis: {title:'c'} });
        }

        document.getElementById('btn-stop').onclick = () => {
            isRunning = false;
            log("Stopping...");
        };

        document.getElementById('btn-run').onclick = async () => {
            if(isRunning) return;
            isRunning = true;
            document.getElementById('btn-stop').disabled = false;
            document.getElementById('btn-run').disabled = true;

            const total = parseInt(document.getElementById('total-iter').value);
            const step = parseInt(document.getElementById('step-iter').value);
            const maxN = parseInt(document.getElementById('max-n').value);
            const pulses = parseInt(document.getElementById('num-pulses').value);
            const maxC = currentMaxC;
            
            if(!lastPovm) {
                lastPovm = new Array((maxC+1)*(maxN+1)).fill(1.0/(maxC+1));
                log("Initialized uniform POVM guess.");
            }

            for(let i=0; i < total; i += step) {
                if(!isRunning) break;
                
                try {
                    const result = await pyodide.globals.get("solve_step")(
                        parsedCounts, parsedAlphas, maxC, maxN, pulses, lastPovm, step
                    );
                    const resJs = result.toJs();
                    lastPovm = resJs.get('x');
                    
                    // Update Heatmap
                    const z = [];
                    for(let c=0; c<=maxC; c++) z.push(lastPovm.slice(c*(maxN+1), (c+1)*(maxN+1)));
                    Plotly.restyle('plot-heat', { z: [z] });

                    // Update Fit Lines
                    const expFlat = resJs.get('expected');
                    const modelY = [];
                    const modelIndices = [];
                    for(let c=0; c<=maxC; c++) {
                        const row = [];
                        for(let a=0; a<parsedAlphas.length; a++) row.push(expFlat[a*(maxC+1)+c]);
                        modelY.push(row);
                        modelIndices.push((c * 2) + 1); // Select the 'Fit' line traces
                    }
                    Plotly.restyle('plot-fit', { y: modelY }, modelIndices);

                    // Update MSE
                    Plotly.extendTraces('plot-mse', { x: [[i+step]], y: [[resJs.get('mse')]] }, [0]);
                    
                    log(`Step ${i+step}/${total} | MSE: ${resJs.get('mse').toExponential(3)}`);
                    result.destroy();
                } catch (e) {
                    log("Solver Error: " + e.message);
                    break;
                }
                await new Promise(r => setTimeout(r, 50)); 
            }
            
            isRunning = false;
            document.getElementById('btn-stop').disabled = true;
            document.getElementById('btn-run').disabled = false;
            log("Execution Finished.");
        };
    </script>
</body>
</html>
